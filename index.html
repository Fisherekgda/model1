<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Model Viewer</title>

  <!-- Three.js r134 (wersja kompatybilna z MindAR 1.2.5) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

  <!-- MindAR image tracking (Three.js edition) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #start-screen {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d0d0d, #1a1a2e);
      color: #fff;
      text-align: center;
      padding: 2rem;
    }

    #start-screen h1 {
      font-family: sans-serif;
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #00e5ff;
    }

    #start-screen p {
      font-family: sans-serif;
      font-size: 1rem;
      color: #ccc;
      margin-bottom: 2rem;
      max-width: 320px;
      line-height: 1.6;
    }

    #start-btn {
      padding: 0.9rem 2.4rem;
      font-size: 1.1rem;
      font-family: sans-serif;
      background: #00e5ff;
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 20px #00e5ff88;
    }

    #hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-family: sans-serif;
      font-size: 0.95rem;
      padding: 0.6rem 1.4rem;
      border-radius: 30px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
    }

    #debug {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      max-width: 90vw;
      display: none;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="start-screen">
      <h1>🔍 AR Model Viewer</h1>
      <p>Naciśnij przycisk, a następnie skieruj aparat na marker, aby zobaczyć model 3D.</p>
      <button id="start-btn">Uruchom AR</button>
    </div>
    <div id="hint">📷 Skieruj aparat na marker...</div>
    <div id="debug"></div>
  </div>

  <script>
    const startBtn   = document.getElementById('start-btn');
    const startScreen= document.getElementById('start-screen');
    const hint       = document.getElementById('hint');
    const debugEl    = document.getElementById('debug');

    // Pokaż debug na ekranie (pomocne na telefonie gdzie nie ma DevTools)
    function log(msg, color) {
      console.log(msg);
      debugEl.style.display = 'block';
      const line = document.createElement('div');
      line.style.color = color || '#0f0';
      line.textContent = msg;
      debugEl.appendChild(line);
    }

    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      hint.style.display = 'block';
      startAR();
    });

    async function startAR() {
      log('▶ startAR()');

      let mindarThree;
      try {
        mindarThree = new window.MINDAR.IMAGE.MindARThree({
          container: document.getElementById('container'),
          imageTargetSrc: 'targets.mind',
          uiLoading: 'yes',
          uiScanning: 'yes',
          uiError: 'yes',
        });
        log('✅ MindARThree OK');
      } catch(e) {
        log('❌ MindARThree error: ' + e.message, '#f55');
        return;
      }

      const { renderer, scene, camera } = mindarThree;

      // Oświetlenie
      const ambient = new THREE.AmbientLight(0xffffff, 0.8);
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(2, 5, 3);
      scene.add(dirLight);

      // Anchor na marker 0
      const anchor = mindarThree.addAnchor(0);

      // --- Fallback: czerwony sześcian żeby zawsze coś było widać ---
      const fallbackGeo  = new THREE.BoxGeometry(0.3, 0.3, 0.3);
      const fallbackMat  = new THREE.MeshStandardMaterial({ color: 0xff2222 });
      const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
      fallbackMesh.visible = false; // ukryty dopóki GLB się nie załaduje
      anchor.group.add(fallbackMesh);

      // --- Ładowanie GLB ---
      log('⏳ Ładowanie model.glb...');
      const loader = new THREE.GLTFLoader();
      loader.load(
        'model.glb',
        (gltf) => {
          log('✅ model.glb załadowany');
          const model = gltf.scene;

          // Auto-skalowanie i centrowanie
          const box    = new THREE.Box3().setFromObject(model);
          const size   = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale  = 0.8 / maxDim;

          model.scale.setScalar(scale);
          model.position.sub(center.multiplyScalar(scale));

          anchor.group.add(model);
          fallbackMesh.visible = false; // mamy GLB, chowamy fallback
          log('✅ Model dodany do sceny, scale=' + scale.toFixed(4));
        },
        (xhr) => {
          if (xhr.lengthComputable) {
            const pct = Math.round(xhr.loaded / xhr.total * 100);
            log('📦 GLB: ' + pct + '%');
          }
        },
        (err) => {
          log('❌ GLB error: ' + (err.message || err), '#f55');
          // Pokaż fallback sześcian żeby wiedzieć że AR działa
          fallbackMesh.visible = true;
        }
      );

      anchor.onTargetFound = () => {
        log('🎯 Marker znaleziony!', '#0ff');
        hint.textContent = '✅ Marker znaleziony!';
        setTimeout(() => { hint.style.display = 'none'; }, 2000);
      };

      anchor.onTargetLost = () => {
        hint.textContent = '📷 Skieruj aparat na marker...';
        hint.style.display = 'block';
      };

      try {
        await mindarThree.start();
        log('✅ MindAR start OK');
      } catch(e) {
        log('❌ MindAR start error: ' + e.message, '#f55');
        return;
      }

      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
    }
  </script>
</body>
</html>
